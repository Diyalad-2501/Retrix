<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            overflow: hidden;
        }
        
        .splash-container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
        }
        
        .retrix-title {
            font-size: 5rem;
            font-weight: bold;
            color: #fff;
            opacity: 0;
            animation: fadeInOut 3s ease-in-out forwards;
            text-shadow: 0 0 30px rgba(79, 172, 254, 0.6);
            margin-bottom: 50px;
        }
        
        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            20% {
                opacity: 0.3;
                transform: scale(0.7);
            }
            50% {
                opacity: 0.7;
                transform: scale(1);
            }
            70% {
                opacity: 1;
                transform: scale(1.1);
            }
            100% {
                opacity: 0;
                transform: scale(1.2);
            }
        }
        
        .progress-container {
            width: 100%;
            opacity: 0;
            animation: fadeIn 0.5s ease-in-out 1.5s forwards;
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
        
        .progress {
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        .progress-bar {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            border-radius: 10px;
            animation: loading 3s ease-in-out forwards;
        }
        
        @keyframes loading {
            0% {
                width: 0;
            }
            10% {
                width: 20%;
            }
            30% {
                width: 45%;
            }
            50% {
                width: 70%;
            }
            80% {
                width: 90%;
            }
            100% {
                width: 100%;
            }
        }
        
        .loading-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .loading-dots {
            display: inline-block;
        }
        
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        
        .percent-text {
            color: #4facfe;
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <h1 class="retrix-title">Retrix</h1>
        
        <div class="progress-container">
            <div class="progress">
                <div class="progress-bar"></div>
            </div>
            <p class="loading-text">Loading<span class="loading-dots"></span></p>
            <p class="percent-text" id="percentText">0%</p>
        </div>
    </div>
    
    <script>
        let percent = 0;
        const percentText = document.getElementById('percentText');
        
        // Update percentage every 50ms
        const interval = setInterval(() => {
            percent += 1;
            if (percent <= 100) {
                percentText.textContent = percent + '%';
            } else {
                clearInterval(interval);
            }
        }, 50); // 50ms * 100 = 5000ms = 5 seconds
        
        setTimeout(() => {
            window.location.href = '/login-selection';
        }, 3000);
    </script>
</body>
</html>
